<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Scout -- Abonmarche Digital Solutions</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
  <style>
    :root {
      --color-try: #1D9E75;
      --color-watch: #BA7517;
      --color-skip: #B4B2A9;
      --bg: #ffffff;
      --bg-card: #f8f8f8;
      --text: #1a1a1a;
      --text-muted: #666666;
      --border: #e0e0e0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg-card: #2a2a2a;
        --text: #e8e8e8;
        --text-muted: #999999;
        --border: #3a3a3a;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }
    .metric-card .value {
      font-size: 2rem;
      font-weight: 700;
    }
    .metric-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .metric-card.try .value { color: var(--color-try); }
    .metric-card.watch .value { color: var(--color-watch); }
    .metric-card.skip .value { color: var(--color-skip); }
    .chart-container {
      max-width: 300px;
      margin: 0 auto 2rem;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
    }
    .entry-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1rem 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid var(--border);
    }
    .entry-card.try_it { border-left-color: var(--color-try); }
    .entry-card.watch { border-left-color: var(--color-watch); }
    .entry-card.skip { border-left-color: var(--color-skip); }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .entry-title {
      font-weight: 600;
      font-size: 1rem;
    }
    .entry-title a {
      color: var(--text);
      text-decoration: none;
    }
    .entry-title a:hover { text-decoration: underline; }
    .entry-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .entry-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .badge {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      background: var(--border);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .entry-summary {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .modal-overlay.active { display: block; }
    .modal-content {
      background: var(--bg);
      max-width: 780px;
      margin: 0 auto;
      border-radius: 10px;
      padding: 2rem 2.5rem;
      position: relative;
      line-height: 1.7;
    }
    .modal-close {
      position: sticky;
      top: 0;
      float: right;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.25rem;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 101;
    }
    .modal-close:hover { background: var(--border); }
    .modal-content h1 { font-size: 1.4rem; margin-bottom: 0.75rem; }
    .modal-content h2 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    .modal-content p { margin-bottom: 0.75rem; }
    .modal-content strong { color: var(--text); }
    .modal-content ul, .modal-content ol { margin: 0.5rem 0 0.75rem 1.5rem; }
    .modal-content li { margin-bottom: 0.3rem; }
    .modal-content code { background: var(--bg-card); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85em; }
    .modal-content pre { background: var(--bg-card); padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.75rem 0; }
    .modal-content pre code { background: none; padding: 0; }
    .modal-content a { color: var(--color-try); }
    @media (max-width: 600px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .modal-content { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
  <h1>Research Scout -- Abonmarche Digital Solutions</h1>
  <p class="subtitle">AI-powered research pipeline for evaluating new tools and technologies</p>

  <div class="metrics">
    <div class="metric-card">
      <div class="value" id="total">0</div>
      <div class="label">Total Researched</div>
    </div>
    <div class="metric-card try">
      <div class="value" id="try-count">0</div>
      <div class="label">Try It</div>
    </div>
    <div class="metric-card watch">
      <div class="value" id="watch-count">0</div>
      <div class="label">Watch</div>
    </div>
    <div class="metric-card skip">
      <div class="value" id="skip-count">0</div>
      <div class="label">Skip</div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="verdict-chart"></canvas>
  </div>

  <div id="entries-container"></div>

  <div class="modal-overlay" id="brief-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="brief-body"></div>
    </div>
  </div>

  <script>
    (async function() {
      let data;
      try {
        const resp = await fetch('research_index.json');
        data = await resp.json();
      } catch (e) {
        document.getElementById('entries-container').innerHTML =
          '<div class="empty-state">No research yet -- drop a link in your Teams channel to get started</div>';
        return;
      }

      const entries = data.entries || [];

      if (entries.length === 0) {
        document.getElementById('entries-container').innerHTML =
          '<div class="empty-state">No research yet -- drop a link in your Teams channel to get started</div>';
        return;
      }

      const tryIt = entries.filter(e => e.verdict === 'try_it');
      const watch = entries.filter(e => e.verdict === 'watch');
      const skip = entries.filter(e => e.verdict === 'skip');

      document.getElementById('total').textContent = entries.length;
      document.getElementById('try-count').textContent = tryIt.length;
      document.getElementById('watch-count').textContent = watch.length;
      document.getElementById('skip-count').textContent = skip.length;

      // Donut chart
      if (entries.length > 0) {
        new Chart(document.getElementById('verdict-chart'), {
          type: 'doughnut',
          data: {
            labels: ['Try It', 'Watch', 'Skip'],
            datasets: [{
              data: [tryIt.length, watch.length, skip.length],
              backgroundColor: ['#1D9E75', '#BA7517', '#B4B2A9'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'bottom' }
            },
            cutout: '60%'
          }
        });
      }

      // Entry cards grouped by verdict
      const container = document.getElementById('entries-container');
      const groups = [
        { label: 'Try It', entries: tryIt, cls: 'try_it' },
        { label: 'Watch', entries: watch, cls: 'watch' },
        { label: 'Skip', entries: skip, cls: 'skip' }
      ];

      groups.forEach(group => {
        if (group.entries.length === 0) return;
        const section = document.createElement('div');
        section.innerHTML = '<h2 class="section-title">' + group.label + ' (' + group.entries.length + ')</h2>';
        group.entries.sort((a, b) => b.date.localeCompare(a.date));
        group.entries.forEach(entry => {
          const card = document.createElement('div');
          card.className = 'entry-card ' + group.cls;
          card.innerHTML =
            '<div class="entry-header">' +
              '<span class="entry-title"><a href="' + (entry.brief_path || '#') + '">' + entry.title + '</a></span>' +
              '<span class="entry-date">' + entry.date + '</span>' +
            '</div>' +
            '<div class="entry-meta">' +
              '<span class="badge">' + (entry.category || '').replace(/_/g, ' ') + '</span>' +
            '</div>' +
            '<div class="entry-summary">' + (entry.summary || '') + '</div>';
          section.appendChild(card);
        });
        container.appendChild(section);
      });
      // Brief modal: intercept clicks on brief links
      container.addEventListener('click', async function(e) {
        var link = e.target.closest('a');
        if (!link || !link.href || !link.href.endsWith('.md')) return;
        e.preventDefault();
        var modal = document.getElementById('brief-modal');
        var body = document.getElementById('brief-body');
        body.innerHTML = '<p style="color:var(--text-muted)">Loading...</p>';
        modal.classList.add('active');
        try {
          var resp = await fetch(link.getAttribute('href'));
          var md = await resp.text();
          body.innerHTML = marked.parse(md);
        } catch (err) {
          body.innerHTML = '<p>Could not load brief.</p>';
        }
      });
    })();

    // Close modal
    document.getElementById('modal-close').addEventListener('click', function() {
      document.getElementById('brief-modal').classList.remove('active');
    });
    document.getElementById('brief-modal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') document.getElementById('brief-modal').classList.remove('active');
    });
  </script>
</body>
</html>
